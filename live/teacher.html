<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎶 서양음악사 게임 교사용 마스터 대시보드</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 12px 28px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-start { background-color: #2a9d8f; } .btn-start:hover { background-color: #21867a; }
        .btn-reset { background-color: #e63946; margin-left: 10px; } .btn-reset:hover { background-color: #cb2d3a; }
        .status-badge { font-size: 18px; padding: 6px 15px; border-radius: 20px; background: #ddd; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .board { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; border-bottom: 3px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 16px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: bold; }
        tr:nth-child(1) td { font-weight: bold; color: #ffb703; background-color: #fffdf0; }
        .full-list { grid-column: span 2; }
        .badge-play { color: #118ab2; font-weight: bold; }
        .badge-clear { color: #2a9d8f; font-weight: bold; }
        .badge-fail { color: #e63946; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎼 서양음악사 라이브 대시보드</h1>
    <div style="background: #eef1f6; padding: 10px; border-radius: 8px;">
        <input type="text" id="teacher-room-code" placeholder="반 코드 (예: 302)" style="padding: 8px; font-size: 14px; border: 2px solid #333; border-radius: 4px; width: 120px;">
        <button class="btn" style="background:#333; padding: 8px 15px; font-size:14px;" onclick="openRoom()">🔓 방 열기</button>
    </div>
    <div>
        현재 <span id="display-room-title" style="color:#e63946; font-weight:bold;">[미설정]</span>반 상태: 
        <span id="server-status" class="status-badge">대기 중</span>
    </div>
    <div>
        <button class="btn btn-start" onclick="setGameStatus('START')">🏁 게임 시작</button>
        <button class="btn btn-reset" onclick="resetAllData()">🔄 반 초기화</button>
    </div>
</div>

<div class="grid-container">
    <div class="board">
        <h2>⏱️ 1. 빛의 속도 순위표 <span style="font-size: 14px; color: #666; font-weight: normal;">(빨리 클리어 한 순)</span></h2>
        <table>
            <thead><tr><th style="width: 15%">순위</th><th style="width: 45%">학생 정보</th><th style="width: 40%">완주 시간</th></tr></thead>
            <tbody id="time-rank-table"></tbody>
        </table>
    </div>

    <div class="board">
        <h2>🏆 2. 명예의 전당 순위표 <span style="font-size: 14px; color: #666; font-weight: normal;">(최고 점수 순)</span></h2>
        <table>
            <thead><tr><th style="width: 15%">순위</th><th style="width: 45%">학생 정보</th><th style="width: 40%">최종 스코어</th></tr></thead>
            <tbody id="score-rank-table"></tbody>
        </table>
    </div>

    <div class="board full-list">
        <h2>👥 실시간 전체 학생 플레이 현황 (<span id="total-count">0</span>명)</h2>
        <table>
            <thead><tr><th>학생명</th><th>현재 실시간 점수</th><th>진행 상태</th></tr></thead>
            <tbody id="student-all-table"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAEDgfUQXvdNVKnpfTB5rycOygL8qyvsJQ",
        authDomain: "compose-merge-live.firebaseapp.com",
        databaseURL: "https://compose-merge-live-default-rtdb.firebaseio.com",
        projectId: "compose-merge-live",
        storageBucket: "compose-merge-live.firebasestorage.app",
        messagingSenderId: "382424352533",
        appId: "1:382424352533:web:9e928bf6b2520599884b1c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentRoom = ""; let dbRefStatus = null; let dbRefStudents = null;

    function openRoom() {
        const code = document.getElementById('teacher-room-code').value.trim();
        if(!code) { alert("개설할 반 코드를 입력하세요! (예: 301)"); return; }
        currentRoom = code; document.getElementById('display-room-title').innerText = `[${currentRoom}]`;
        
        if(dbRefStatus) dbRefStatus.off(); if(dbRefStudents) dbRefStudents.off();

        database.ref('rooms/' + currentRoom + '/gameState').set({ status: "READY" });

        dbRefStatus = database.ref('rooms/' + currentRoom + '/gameState/status');
        dbRefStatus.on('value', (snapshot) => {
            const status = snapshot.val() || "READY"; const badge = document.getElementById('server-status');
            if(status === "START") { badge.innerText = "🚀 연주 중!"; badge.style.backgroundColor = "#2a9d8f"; badge.style.color = "white"; } 
            else { badge.innerText = "💤 대기 중"; badge.style.backgroundColor = "#ddd"; badge.style.color = "#333"; }
        });

        dbRefStudents = database.ref('rooms/' + currentRoom + '/students');
        dbRefStudents.on('value', (snapshot) => {
            const data = snapshot.val(); const studentList = [];
            if (data) { Object.keys(data).forEach(key => { studentList.push(data[key]); }); }
            document.getElementById('total-count').innerText = studentList.length;

            const allTable = document.getElementById('student-all-table'); allTable.innerHTML = "";
            studentList.forEach(s => {
                let badgeClass = "badge-play"; if(s.status.includes("완주")) badgeClass = "badge-clear"; if(s.status.includes("탈락")) badgeClass = "badge-fail";
                allTable.innerHTML += `<tr><td><b>${s.name}</b></td><td>${s.score} 점</td><td class="${badgeClass}">${s.status}</td></tr>`;
            });

            const timeRankTable = document.getElementById('time-rank-table'); timeRankTable.innerHTML = "";
            const clearStudents = studentList.filter(s => s.clearTime < 999999); clearStudents.sort((a, b) => a.clearTime - b.clearTime);
            clearStudents.slice(0, 10).forEach((s, idx) => { timeRankTable.innerHTML += `<tr><td>🏅 ${idx + 1}등</td><td>${s.name}</td><td><span style="color:#2a9d8f; font-weight:bold;">${s.clearTime}초</span></td></tr>`; });
            if(clearStudents.length === 0) timeRankTable.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#999;'>완주자가 없습니다.</td></tr>";

            const scoreRankTable = document.getElementById('score-rank-table'); scoreRankTable.innerHTML = "";
            const scoreStudents = [...studentList]; scoreStudents.sort((a, b) => b.score - a.score);
            scoreStudents.slice(0, 10).forEach((s, idx) => { scoreRankTable.innerHTML += `<tr><td>🏆 ${idx + 1}등</td><td>${s.name}</td><td><span style="color:#118ab2; font-weight:bold;">${s.score}점</span></td></tr>`; });
            if(scoreStudents.length === 0) scoreRankTable.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#999;'>접속한 학생이 없습니다.</td></tr>";
        });
        alert(`${currentRoom}반 방이 개설되었습니다!`);
    }

    function setGameStatus(status) { if(!currentRoom) { alert("먼저 방을 열어주세요!"); return; } database.ref('rooms/' + currentRoom + '/gameState').set({ status: status }); }
    function resetAllData() { if(!currentRoom) return; if(confirm(`[${currentRoom}반] 데이터를 초기화할까요?`)) { database.ref('rooms/' + currentRoom).remove(); database.ref('rooms/' + currentRoom + '/gameState').set({ status: "READY" }); } }
</script>
</body>
</html>
