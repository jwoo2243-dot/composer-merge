<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서양음악사 작곡가 합치기 게임 (학생용)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DFBitBitv2'; src: url('font.ttf') format('truetype'); }
        body { margin: 0; padding: 0; background-color: #f5f5f7; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'DFBitBitv2', sans-serif; overflow: hidden; touch-action: manipulation; }
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #f5f5f7; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; font-size: 20px; color: #222; }
        .input-box { padding: 12px; font-size: 18px; border: 4px solid #222; border-radius: 8px; text-align: center; margin-bottom: 15px; font-family: 'DFBitBitv2'; width: 220px; }
        .start-enter-btn { padding: 12px 24px; font-size: 18px; background-color: #ffb703; border: 3px solid #222; border-radius: 8px; cursor: pointer; font-family: 'DFBitBitv2'; box-shadow: 0 4px 0 #222; }
        .start-enter-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #222; }
        #ui-container { display: flex; justify-content: space-between; align-items: center; width: 400px; max-width: 100vw; box-sizing: border-box; padding: 0 10px; margin-bottom: 15px; z-index: 5; }
        #score-board { font-size: 18px; color: #222; background-color: #fff; border: 4px solid #222; border-radius: 8px; text-align: center; min-width: 130px; height: 50px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        #next-box { background-color: #fff; border: 4px solid #222; border-radius: 8px; min-width: 210px; height: 50px; box-sizing: border-box; display: flex; flex-direction: row; align-items: center; justify-content: center; padding: 0 8px; }
        #next-label { font-size: 12px; color: #777; margin-right: 8px; border-right: 2px solid #ddd; padding-right: 8px; flex-shrink: 0; }
        #next-text { font-size: 12px; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        #next-preview { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; border: 2px solid #222; }
        canvas { display: block !important; border: 4px solid #222 !important; border-radius: 12px; box-sizing: border-box; cursor: pointer; max-width: 100vw; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .popup-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.98); padding: 20px 25px; border: 4px solid #222; border-radius: 12px; text-align: center; z-index: 10; width: 280px; box-sizing: border-box; }
        .popup-title { font-size: 28px; margin-bottom: 8px; }
        .popup-sub { font-size: 16px; color: #555; margin-bottom: 15px; line-height: 1.4; word-break: keep-all; }
        .final-score { font-size: 20px; color: #118ab2; margin-bottom: 15px; background-color: #eef1f6; padding: 6px 12px; border-radius: 6px; display: inline-block; }
        .restart-btn { display: block; width: 100%; padding: 12px 0; font-family: 'DFBitBitv2', sans-serif; font-size: 18px; color: #222; background-color: #ffb703; border: 3px solid #222; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #222; text-align: center; user-select: none; }
        .restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #222; }
    </style>
</head>
<body>

<div id="login-screen" class="overlay-screen">
    <div style="margin-bottom: 20px; font-size: 24px;">🎵 음악사 마스터 등록 🎵</div>
    <input type="text" id="room-code" class="input-box" placeholder="접속 코드 (예: 301)" maxlength="10">
    <input type="text" id="student-info" class="input-box" placeholder="학번 이름 (예: 30101 홍길동)" maxlength="15">
    <button class="start-enter-btn" onclick="registerStudent()">접속하기</button>
</div>

<div id="wait-screen" class="overlay-screen" style="display: none;">
    <div style="text-align: center; line-height: 1.6;">
         선생님의 지휘를 기다리는 중...<br>
        <span style="font-size: 15px; color:#666;">(교사가 시작을 누르면 게임이 가동됩니다)</span>
    </div>
</div>

<div id="loading-screen" class="overlay-screen" style="display: none;">🎵 오케스트라 조율 중...</div>

<div id="ui-container">
    <div id="score-board">점수: <span id="score">0</span></div>
    <div id="next-box">
        <div id="next-label">NEXT</div>
        <div id="next-text"><span id="next-preview"></span><span id="next-name">-</span></div>
    </div>
</div>

<div id="game-over-screen" class="popup-screen">
    <div class="popup-title" style="color: #e63946;">🎵 띠로리... 🎵</div>
    <div class="popup-sub">연주가 중단되었습니다!</div>
    <div class="final-score">최종 점수: <span id="final-score-val">0</span>점</div>
    <button class="restart-btn" onclick="resetGame()" style="background-color: #e63946; color: #fff;">다시 대기하기</button>
</div>

<div id="game-clear-screen" class="popup-screen">
    <div class="popup-title" style="color: #ffb703;">🎉축하합니다!🎉</div>
    <div class="popup-sub">서양음악사 마스터!</div>
    <div class="final-score" style="color: #2a9d8f; background-color: #e8f5e9;">클리어 점수: <span id="clear-score-val">0</span>점</div>
    <button class="restart-btn" onclick="resetGame()">앙코르 공연 대기</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAEDgfUQXvdNVKnpfTB5rycOygL8qyvsJQ",
        authDomain: "compose-merge-live.firebaseapp.com",
        databaseURL: "https://compose-merge-live-default-rtdb.firebaseio.com",
        projectId: "compose-merge-live",
        storageBucket: "compose-merge-live.firebasestorage.app",
        messagingSenderId: "382424352533",
        appId: "1:382424352533:web:9e928bf6b2520599884b1c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let studentKey = ""; let studentName = ""; let roomCode = ""; let gameStartTime = 0;
    const GAME_GRAVITY = 0.9; const GAME_BOUNCE = 0.3;
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    let currentScore = 0; let isGameOver = false; let gameOverTimer = null; let nextNoteIndex = 0; let isClickBlocked = false;
    let engine, render, runner, ground, leftWall, rightWall;
    
    const scoreDisplay = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreVal = document.getElementById('final-score-val');
    const gameClearScreen = document.getElementById('game-clear-screen');
    const clearScoreVal = document.getElementById('clear-score-val');
    const nextPreview = document.getElementById('next-preview');
    const nextName = document.getElementById('next-name');

    const noteSettings = [
        { level: 0, name: "중세(마쇼)", radius: 22, color: '#ffadad', image: '0.PNG', baseSize: 512 }, 
        { level: 1, name: "르네상스(팔레스트리나)", radius: 28, color: '#ffd166', image: '1.PNG', baseSize: 512 }, 
        { level: 2, name: "바로크(바흐)", radius: 36, color: '#06d6a0', image: '2.PNG', baseSize: 512 }, 
        { level: 3, name: "고전(모차르트)", radius: 44, color: '#118ab2', image: '3.PNG', baseSize: 512 }, 
        { level: 4, name: "고전(베토벤)", radius: 52, color: '#073b4c', image: '4.PNG', baseSize: 512 }, 
        { level: 5, name: "낭만(쇼팽)", radius: 62, color: '#8338ec', image: '5.PNG', baseSize: 512 }, 
        { level: 6, name: "근대(드뷔시)", radius: 72, color: '#3a86c8', image: '6.PNG', baseSize: 512 }, 
        { level: 7, name: "현대(스트라빈스키)", radius: 85, color: '#e63946', image: '7.PNG', baseSize: 512 }  
    ];
    const DEADLINE_Y = 130; const preloadedImages = {}; let loadedCount = 0; const totalImages = noteSettings.length + 1;

    function preloadAllImages(callback) {
        noteSettings.forEach(note => {
            const img = new Image(); img.src = note.image;
            img.onload = () => { loadedCount++; if (loadedCount === totalImages) callback(); };
            preloadedImages[note.image] = img;
        });
        const bgImg = new Image(); bgImg.src = 'bg.png';
        bgImg.onload = () => { loadedCount++; if (loadedCount === totalImages) callback(); };
    }

    function getRenderOptions(setting) {
        if (setting.image) {
            const imgElement = preloadedImages[setting.image];
            const actualWidth = imgElement ? imgElement.width : setting.baseSize;
            const imgScale = (setting.radius * 2) / actualWidth;
            return { sprite: { texture: setting.image, xScale: imgScale, yScale: imgScale } };
        } else { return { fillStyle: setting.color }; }
    }

    function registerStudent() {
        const codeInput = document.getElementById('room-code').value.trim();
        const nameInput = document.getElementById('student-info').value.trim();
        if(!codeInput) { alert("접속 코드를 입력해주세요!"); return; }
        if(!nameInput) { alert("학번과 이름을 입력해주세요!"); return; }
        roomCode = codeInput; studentName = nameInput;

        database.ref('rooms/' + roomCode + '/gameState/status').once('value', (snapshot) => {
            if(!snapshot.exists()) { alert("아직 개설되지 않은 코드입니다. 선생님께 확인해보세요!"); return; }
            
            const newRef = database.ref('rooms/' + roomCode + '/students').push();
            studentKey = newRef.key;
            newRef.set({ name: studentName, score: 0, status: "대기 중", clearTime: 999999 });

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('wait-screen').style.display = 'flex';

            database.ref('rooms/' + roomCode + '/gameState/status').on('value', (statusSnap) => {
                if(statusSnap.val() === "START") { listenToTeacherStart(); }
            });
            database.ref('rooms/' + roomCode + '/students/' + studentKey).onDisconnect().remove();
        });
    }

    function listenToTeacherStart() {
        document.getElementById('wait-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        preloadAllImages(() => {
            document.getElementById('loading-screen').style.display = 'none';
            gameStartTime = Date.now();
            database.ref('rooms/' + roomCode + '/students/' + studentKey).update({ status: "연주 중" });
            initGame();
        });
    }

    function sendScoreUpdate(score, status, cTime = 999999) {
        if(!studentKey || !roomCode) return;
        database.ref('rooms/' + roomCode + '/students/' + studentKey).update({ score: score, status: status, clearTime: cTime });
    }

    function updateNextData() {
        nextNoteIndex = Math.floor(Math.random() * 4); const nextNote = noteSettings[nextNoteIndex];
        nextPreview.style.backgroundColor = nextNote.color; nextName.innerText = nextNote.name;
    }

    function initGame() {
        currentScore = 0; isGameOver = false; gameOverTimer = null; isClickBlocked = false;
        scoreDisplay.innerText = currentScore; gameOverScreen.style.display = 'none'; gameClearScreen.style.display = 'none';
        updateNextData(); engine = Engine.create(); engine.gravity.y = GAME_GRAVITY;
        const oldCanvas = document.querySelector('canvas'); if (oldCanvas) oldCanvas.remove();

        render = Render.create({ element: document.body, engine: engine, options: { width: 400, height: 600, wireframes: false, background: 'url(bg.png)' } });
        Render.run(render); runner = Runner.create(); Runner.run(runner, engine);

        ground = Bodies.rectangle(200, 592, 400, 16, { isStatic: true, restitution: GAME_BOUNCE, render: { fillStyle: 'transparent' } });
        leftWall = Bodies.rectangle(8, 300, 16, 600, { isStatic: true, restitution: GAME_BOUNCE, render: { fillStyle: 'transparent' } });
        rightWall = Bodies.rectangle(392, 300, 16, 600, { isStatic: true, restitution: GAME_BOUNCE, render: { fillStyle: 'transparent' } });
        Composite.add(engine.world, [ground, leftWall, rightWall]);
        setupEvents();
    }

    function setupEvents() {
        Events.on(engine, 'collisionStart', (event) => {
            if (isGameOver) return;
            event.pairs.forEach((pair) => {
                const bodyA = pair.bodyA; const bodyB = pair.bodyB;
                if (bodyA.plugin && bodyA.plugin.level !== undefined && bodyB.plugin && bodyB.plugin.level !== undefined) {
                    if (bodyA.plugin.level === bodyB.plugin.level) {
                        const currentLevel = bodyA.plugin.level;
                        if (currentLevel === noteSettings.length - 1) {
                            currentScore += 5000; scoreDisplay.innerText = currentScore; isGameOver = true; 
                            const elapsedSec = ((Date.now() - gameStartTime) / 1000).toFixed(2);
                            clearScoreVal.innerText = currentScore; gameClearScreen.style.display = 'block';
                            sendScoreUpdate(currentScore, `완주 (${elapsedSec}초)`, parseFloat(elapsedSec));
                            Composite.remove(engine.world, [bodyA, bodyB]); Runner.stop(runner); return;
                        }
                        currentScore += (currentLevel + 1) * 10; scoreDisplay.innerText = currentScore; 
                        sendScoreUpdate(currentScore, "연주 중");
                        const middleX = (bodyA.position.x + bodyB.position.x) / 2; const middleY = (bodyA.position.y + bodyB.position.y) / 2;
                        Composite.remove(engine.world, [bodyA, bodyB]);
                        const nextLevel = currentLevel + 1; const nextNoteSetting = noteSettings[nextLevel];
                        const evolvedNote = Bodies.circle(middleX, middleY, nextNoteSetting.radius, { restitution: GAME_BOUNCE, plugin: { level: nextLevel, isPlaced: true }, render: getRenderOptions(nextNoteSetting) });
                        Composite.add(engine.world, evolvedNote);
                    }
                }
            });
        });

        Events.on(engine, 'afterUpdate', () => {
            if (isGameOver) return;
            const allBodies = Composite.allBodies(engine.world); let isAnyBodyOverflow = false;
            allBodies.forEach(body => { if (body.plugin && body.plugin.isPlaced && body.position.y < DEADLINE_Y) isAnyBodyOverflow = true; });
            if (isAnyBodyOverflow) { if (!gameOverTimer) { gameOverTimer = setTimeout(() => { triggerGameOver(); }, 3000); } } 
            else { if (gameOverTimer) { clearTimeout(gameOverTimer); gameOverTimer = null; } }
        });

        Events.on(render, 'afterRender', () => {
            const context = render.context; context.beginPath(); context.moveTo(0, DEADLINE_Y); context.lineTo(400, DEADLINE_Y);
            context.strokeStyle = '#e63946'; context.lineWidth = 2; context.setLineDash([5, 5]); context.stroke();
        });
    }

    window.addEventListener('pointerdown', (event) => {
        if (isGameOver || isClickBlocked) return; 
        if (event.target.closest('.popup-screen') || event.target.closest('#ui-container')) return;
        const canvasBounds = render.canvas.getBoundingClientRect();
        const mouseX = event.clientX - canvasBounds.left; const mouseY = event.clientY - canvasBounds.top;
        if (mouseX > 20 && mouseX < 380 && mouseY > 0 && mouseY < 600) {
            isClickBlocked = true; const selectedNote = noteSettings[nextNoteIndex];
            const newNote = Bodies.circle(mouseX, 80, selectedNote.radius, { restitution: GAME_BOUNCE, plugin: { level: selectedNote.level, isPlaced: false }, render: getRenderOptions(selectedNote) });
            Composite.add(engine.world, newNote);
            setTimeout(() => { newNote.plugin.isPlaced = true; }, 1000); updateNextData();
            setTimeout(() => { isClickBlocked = false; }, 500);
        }
    });

    function triggerGameOver() { isGameOver = true; finalScoreVal.innerText = currentScore; gameOverScreen.style.display = 'block'; sendScoreUpdate(currentScore, "탈락 😭"); Runner.stop(runner); }
    function resetGame() { location.reload(); }
</script>
</body>
</html>
